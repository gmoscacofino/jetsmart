name: Terraform

on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'
      - 'scripts/build-layers.sh'
      - '.github/workflows/terraform.yml'
  pull_request:
    branches: [main]
    paths:
      - 'terraform/**'
  # Trigger manual para backend/plan/apply (requiere secrets cargados)
  workflow_dispatch:
    inputs:
      action:
        description: 'Acción a ejecutar'
        required: true
        default: 'plan'
        type: choice
        options: [backend, plan, apply, destroy]

env:
  TF_VERSION: '1.10.0'
  AWS_REGION: 'us-east-1'
  WORKING_DIR: 'terraform/infra'

jobs:
  # ── Job 1: Validate + Test (sin credenciales AWS, corre siempre) ───────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # ZIPs placeholder para que filebase64sha256() no falle en validate/test.
      # No contienen código real — el deploy job construye los layers reales.
      - name: Create placeholder layer ZIPs
        run: |
          mkdir -p builds
          python3 -c "import zipfile; zipfile.ZipFile('builds/anthropic-layer.zip', 'w').close()"
          python3 -c "import zipfile; zipfile.ZipFile('builds/psycopg2-layer.zip', 'w').close()"

      # -backend=false evita conectarse a S3 — solo inicializa providers
      - name: Terraform Init (sin backend)
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

      # Corre desde terraform/ para cubrir también terraform/backend/
      - name: Terraform Format Check
        working-directory: terraform
        run: terraform fmt -check -recursive

      # mock_provider "aws" en los .tftest.hcl evita necesitar credenciales reales
      - name: Terraform Test
        run: terraform test

  # ── Job 2: Backend (crea el bucket S3 para el state — solo la primera vez) ───
  backend:
    name: Create Backend
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'backend'
    needs: validate
    defaults:
      run:
        working-directory: terraform/backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      # Si el bucket ya existe (run anterior falló a mitad), importarlo al state
      # para que Terraform no intente recrearlo. || true ignora el error si no existe aún.
      - name: Import existing resources (idempotente)
        env:
          TF_VAR_state_bucket_suffix: ${{ secrets.STATE_BUCKET_SUFFIX }}
        run: |
          BUCKET="jetsmart-terraform-state-${{ secrets.STATE_BUCKET_SUFFIX }}"
          terraform import aws_s3_bucket.terraform_state                                    "$BUCKET" || true
          terraform import aws_s3_bucket_versioning.terraform_state                         "$BUCKET" || true
          terraform import aws_s3_bucket_server_side_encryption_configuration.terraform_state "$BUCKET" || true
          terraform import aws_s3_bucket_public_access_block.terraform_state                "$BUCKET" || true

      - name: Terraform Apply
        env:
          TF_VAR_state_bucket_suffix: ${{ secrets.STATE_BUCKET_SUFFIX }}
        run: terraform apply -auto-approve

  # ── Job 3: Plan / Apply (infraestructura completa) ─────────────────────────
  deploy:
    name: ${{ github.event.inputs.action == 'apply' && 'Apply' || 'Plan' }}
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.action == 'plan' || github.event.inputs.action == 'apply')
    needs: validate
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # Construye los Lambda Layers reales compilados para Linux x86_64
      - name: Build Lambda Layers
        working-directory: ${{ github.workspace }}
        run: bash scripts/build-layers.sh

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=jetsmart-terraform-state-${{ secrets.STATE_BUCKET_SUFFIX }}" \
            -backend-config="key=infra/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="use_lockfile=true" \
            -backend-config="encrypt=true"

      - name: Terraform Plan
        env:
          TF_VAR_anthropic_api_key:   ${{ secrets.TF_VAR_ANTHROPIC_API_KEY }}
          TF_VAR_rds_password:        ${{ secrets.TF_VAR_RDS_PASSWORD }}
          TF_VAR_state_bucket_suffix: ${{ secrets.STATE_BUCKET_SUFFIX }}
          TF_VAR_mock_mode:           ${{ secrets.TF_VAR_ANTHROPIC_API_KEY != '' && 'false' || 'true' }}
        run: terraform plan -out=tfplan

      - name: Cleanup secrets pendientes de eliminación
        if: github.event.inputs.action == 'apply'
        run: |
          for SECRET in "jetsmart-prod/anthropic-api-key" "jetsmart-prod/rds-credentials"; do
            DELETED=$(aws secretsmanager describe-secret \
              --secret-id "$SECRET" --region ${{ env.AWS_REGION }} \
              --query 'DeletedDate' --output text 2>/dev/null)
            if [ -n "$DELETED" ] && [ "$DELETED" != "None" ]; then
              echo "Force-deleting pending secret: $SECRET"
              aws secretsmanager delete-secret \
                --secret-id "$SECRET" \
                --force-delete-without-recovery \
                --region ${{ env.AWS_REGION }} 2>/dev/null && echo "Deleted" || true
            else
              echo "Secret $SECRET no está pendiente de eliminación (ok)"
            fi
          done

      - name: Cleanup reglas SG inline residuales
        if: github.event.inputs.action == 'apply'
        run: |
          LAMBDA_SG=$(terraform state show aws_security_group.lambda 2>/dev/null \
            | awk '/^\s+id\s+=/ {gsub(/"/, "", $3); print $3}')
          PROXY_SG=$(terraform state show aws_security_group.rds_proxy 2>/dev/null \
            | awk '/^\s+id\s+=/ {gsub(/"/, "", $3); print $3}')
          [ -z "$LAMBDA_SG" ] && echo "SGs no en state aún, skipping" && exit 0
          echo "Lambda SG: $LAMBDA_SG | Proxy SG: $PROXY_SG"
          aws ec2 revoke-security-group-egress \
            --group-id "$LAMBDA_SG" \
            --ip-permissions '[{"IpProtocol":"tcp","FromPort":443,"ToPort":443,"IpRanges":[{"CidrIp":"10.0.0.0/16"}]}]' \
            --region ${{ env.AWS_REGION }} 2>/dev/null \
            && echo "Removed egress 443 (era inline)" || echo "Egress 443 no presente (ok)"
          aws ec2 revoke-security-group-ingress \
            --group-id "$PROXY_SG" \
            --ip-permissions "[{\"IpProtocol\":\"tcp\",\"FromPort\":5432,\"ToPort\":5432,\"UserIdGroupPairs\":[{\"GroupId\":\"$LAMBDA_SG\"}]}]" \
            --region ${{ env.AWS_REGION }} 2>/dev/null \
            && echo "Removed ingress 5432 (era inline)" || echo "Ingress 5432 no presente (ok)"

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        env:
          TF_VAR_anthropic_api_key:   ${{ secrets.TF_VAR_ANTHROPIC_API_KEY }}
          TF_VAR_rds_password:        ${{ secrets.TF_VAR_RDS_PASSWORD }}
          TF_VAR_state_bucket_suffix: ${{ secrets.STATE_BUCKET_SUFFIX }}
          TF_VAR_mock_mode:           ${{ secrets.TF_VAR_ANTHROPIC_API_KEY != '' && 'false' || 'true' }}
        run: terraform apply -auto-approve tfplan

      - name: Inject Terraform outputs into config.js
        if: github.event.inputs.action == 'apply'
        run: |
          CONFIG="${{ github.workspace }}/frontend/js/config.js"
          sed -i "s|REEMPLAZAR_CON_terraform_output_cognito_user_pool_id|$(terraform output -raw cognito_user_pool_id)|g"     "$CONFIG"
          sed -i "s|REEMPLAZAR_CON_terraform_output_cognito_client_id|$(terraform output -raw cognito_client_id)|g"           "$CONFIG"
          sed -i "s|REEMPLAZAR_CON_terraform_output_cognito_hosted_ui_url|$(terraform output -raw cognito_hosted_ui_url)|g"   "$CONFIG"
          sed -i "s|REEMPLAZAR_CON_terraform_output_auth_callback_url|$(terraform output -raw auth_callback_url)|g"           "$CONFIG"
          sed -i "s|REEMPLAZAR_CON_terraform_output_frontend_url|$(terraform output -raw frontend_url)|g"                     "$CONFIG"
          sed -i "s|REEMPLAZAR_CON_terraform_output_chatbot_api_url|$(terraform output -raw chatbot_api_url)|g"               "$CONFIG"

      - name: Deploy Frontend to S3
        if: github.event.inputs.action == 'apply'
        run: |
          BUCKET=$(terraform output -raw frontend_bucket_name)
          aws s3 sync ${{ github.workspace }}/frontend/ s3://$BUCKET/ --delete

      - name: Run RDS Migration
        if: github.event.inputs.action == 'apply'
        run: |
          FUNCTION=$(terraform output -raw analytics_processor_function_name)
          PROXY_NAME=$(terraform output -raw rds_proxy_name)
          echo "Esperando a que RDS Proxy esté disponible..."
          STATUS=""
          for i in $(seq 1 24); do
            STATUS=$(aws rds describe-db-proxies \
              --db-proxy-name "$PROXY_NAME" \
              --region ${{ env.AWS_REGION }} \
              --query 'DBProxies[0].Status' \
              --output text 2>/dev/null || echo "unknown")
            echo "RDS Proxy status: $STATUS (intento $i/24)"
            [ "$STATUS" = "available" ] && break
            sleep 30
          done
          if [ "$STATUS" != "available" ]; then
            echo "RDS Proxy no estuvo disponible después de 12 minutos" && exit 1
          fi
          echo "Esperando 90s para que RDS Proxy establezca conexiones hacia RDS..."
          sleep 90
          for attempt in 1 2 3; do
            echo "Migration attempt $attempt/3..."
            aws lambda invoke \
              --function-name "$FUNCTION" \
              --payload '{"migrate": true}' \
              --cli-binary-format raw-in-base64-out \
              --cli-read-timeout 300 \
              --region ${{ env.AWS_REGION }} \
              response.json
            cat response.json
            if grep -q '"migrated"' response.json; then
              echo "Migration successful"
              exit 0
            fi
            echo "Retrying in 30s..."
            sleep 30
          done
          echo "Migration failed after 3 attempts" && exit 1

      - name: Show Outputs
        if: github.event.inputs.action == 'apply'
        run: |
          echo "## URLs del deploy" >> $GITHUB_STEP_SUMMARY
          echo "| Recurso | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | $(terraform output -raw frontend_url) |" >> $GITHUB_STEP_SUMMARY
          echo "| Chatbot API | $(terraform output -raw chatbot_api_url) |" >> $GITHUB_STEP_SUMMARY
          echo "| Cognito Hosted UI | $(terraform output -raw cognito_hosted_ui_url) |" >> $GITHUB_STEP_SUMMARY
          echo "| Auth Callback | $(terraform output -raw auth_callback_url) |" >> $GITHUB_STEP_SUMMARY

  # ── Job 4: Destroy (destruye toda la infraestructura) ─────────────────────
  destroy:
    name: Destroy
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
    needs: validate
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # Para destroy solo se necesitan los ZIPs — no hace falta compilar los layers reales
      - name: Create placeholder layer ZIPs
        run: |
          mkdir -p builds
          python3 -c "import zipfile; zipfile.ZipFile('builds/anthropic-layer.zip', 'w').close()"
          python3 -c "import zipfile; zipfile.ZipFile('builds/psycopg2-layer.zip', 'w').close()"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=jetsmart-terraform-state-${{ secrets.STATE_BUCKET_SUFFIX }}" \
            -backend-config="key=infra/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="use_lockfile=true" \
            -backend-config="encrypt=true"

      - name: Terraform Destroy
        env:
          TF_VAR_anthropic_api_key:   ${{ secrets.TF_VAR_ANTHROPIC_API_KEY }}
          TF_VAR_rds_password:        ${{ secrets.TF_VAR_RDS_PASSWORD }}
          TF_VAR_state_bucket_suffix: ${{ secrets.STATE_BUCKET_SUFFIX }}
          TF_VAR_mock_mode:           ${{ secrets.TF_VAR_ANTHROPIC_API_KEY != '' && 'false' || 'true' }}
        run: terraform destroy -auto-approve
