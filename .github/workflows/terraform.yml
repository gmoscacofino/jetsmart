name: Terraform

on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'
      - 'scripts/build-layers.sh'
      - '.github/workflows/terraform.yml'
  pull_request:
    branches: [main]
    paths:
      - 'terraform/**'
  # Trigger manual para backend/plan/apply (requiere secrets cargados)
  workflow_dispatch:
    inputs:
      action:
        description: 'Acción a ejecutar'
        required: true
        default: 'plan'
        type: choice
        options: [backend, plan, apply, destroy]

env:
  TF_VERSION: '1.10.0'
  AWS_REGION: 'us-east-1'
  WORKING_DIR: 'terraform/infra'

jobs:
  # ── Job 1: Validate + Test (sin credenciales AWS, corre siempre) ───────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # ZIPs placeholder para que filebase64sha256() no falle en validate/test.
      # No contienen contenido real — el deploy job construye los layers reales.
      - name: Create placeholder layer ZIPs
        run: |
          mkdir -p builds
          python3 -c "import zipfile; zipfile.ZipFile('builds/anthropic-layer.zip', 'w').close()"
          python3 -c "import zipfile; zipfile.ZipFile('builds/system-prompt-layer.zip', 'w').close()"

      # -backend=false evita conectarse a S3 — solo inicializa providers
      - name: Terraform Init (sin backend)
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

      # Corre desde terraform/ para cubrir también terraform/backend/
      - name: Terraform Format Check
        working-directory: terraform
        run: terraform fmt -check -recursive

      # mock_provider "aws" en los .tftest.hcl evita necesitar credenciales reales
      - name: Terraform Test
        run: terraform test

  # ── Job 2: Backend (crea el bucket S3 para el state — solo la primera vez) ───
  backend:
    name: Create Backend
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'backend'
    needs: validate
    defaults:
      run:
        working-directory: terraform/backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      # Si el bucket ya existe (run anterior falló a mitad), importarlo al state
      # para que Terraform no intente recrearlo. || true ignora el error si no existe aún.
      - name: Import existing resources (idempotente)
        env:
          TF_VAR_state_bucket_suffix: ${{ secrets.STATE_BUCKET_SUFFIX }}
        run: |
          BUCKET="jetsmart-terraform-state-${{ secrets.STATE_BUCKET_SUFFIX }}"
          terraform import aws_s3_bucket.terraform_state                                    "$BUCKET" || true
          terraform import aws_s3_bucket_versioning.terraform_state                         "$BUCKET" || true
          terraform import aws_s3_bucket_server_side_encryption_configuration.terraform_state "$BUCKET" || true
          terraform import aws_s3_bucket_public_access_block.terraform_state                "$BUCKET" || true

      - name: Terraform Apply
        env:
          TF_VAR_state_bucket_suffix: ${{ secrets.STATE_BUCKET_SUFFIX }}
        run: terraform apply -auto-approve

  # ── Job 3: Plan / Apply (infraestructura completa) ─────────────────────────
  deploy:
    name: ${{ github.event.inputs.action == 'apply' && 'Apply' || 'Plan' }}
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.action == 'plan' || github.event.inputs.action == 'apply')
    needs: validate
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # Construye el Lambda Layer real compilado para Linux x86_64.
      # En TP4 sólo queda el layer Anthropic — psycopg2 se eliminó junto con RDS.
      - name: Build Lambda Layers
        working-directory: ${{ github.workspace }}
        run: bash scripts/build-layers.sh

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=jetsmart-terraform-state-${{ secrets.STATE_BUCKET_SUFFIX }}" \
            -backend-config="key=infra/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="use_lockfile=true" \
            -backend-config="encrypt=true"

      # Crea SÓLO los repos ECR primero (apply targeteado) — evita el chicken-and-egg:
      # las imágenes se pushean a repos que ya existen, antes del apply completo
      # que crea los ECS services que las pullean.
      - name: Crear repos ECR (apply targeteado)
        if: github.event.inputs.action == 'apply'
        env:
          TF_VAR_anthropic_api_key:   ${{ secrets.TF_VAR_ANTHROPIC_API_KEY }}
          TF_VAR_weather_api_key:     ${{ secrets.TF_VAR_WEATHER_API_KEY }}
          TF_VAR_state_bucket_suffix: ${{ secrets.STATE_BUCKET_SUFFIX }}
        run: |
          terraform apply -auto-approve \
            -target=aws_ecr_repository.chat_handler \
            -target=aws_ecr_repository.weather_poller

      # Build + push de las dos imágenes Fargate. chat-handler se buildea con
      # contexto = repo root (copia lambda/*.py + el system prompt); weather-poller
      # es self-contained.
      - name: Build & push imágenes a ECR
        if: github.event.inputs.action == 'apply'
        working-directory: ${{ github.workspace }}
        run: |
          CHAT_REPO=$(terraform -chdir=terraform/infra output -raw ecr_chat_handler_url)
          POLLER_REPO=$(terraform -chdir=terraform/infra output -raw ecr_weather_poller_url)
          REGISTRY=$(echo "$CHAT_REPO" | cut -d/ -f1)
          aws ecr get-login-password --region ${{ env.AWS_REGION }} \
            | docker login --username AWS --password-stdin "$REGISTRY"
          docker build -f app/chat-handler/Dockerfile   -t "$CHAT_REPO:${{ github.sha }}"   .
          docker build -f app/weather-poller/Dockerfile -t "$POLLER_REPO:${{ github.sha }}" app/weather-poller
          docker push "$CHAT_REPO:${{ github.sha }}"
          docker push "$POLLER_REPO:${{ github.sha }}"

      # Cleanup de secret Anthropic en estado pendiente de eliminación (de runs anteriores).
      # AWS Secrets Manager bloquea recrear un secret con el mismo nombre si está scheduled-for-deletion.
      - name: Cleanup secret Anthropic pendiente de eliminación
        if: github.event.inputs.action == 'apply'
        run: |
          SECRET="jetsmart-prod/anthropic-api-key"
          DELETED=$(aws secretsmanager describe-secret \
            --secret-id "$SECRET" --region ${{ env.AWS_REGION }} \
            --query 'DeletedDate' --output text 2>/dev/null) || true
          if [ -n "$DELETED" ] && [ "$DELETED" != "None" ]; then
            echo "Force-deleting pending secret: $SECRET"
            aws secretsmanager delete-secret \
              --secret-id "$SECRET" \
              --force-delete-without-recovery \
              --region ${{ env.AWS_REGION }} 2>/dev/null && echo "Deleted" || true
          else
            echo "Secret $SECRET no está pendiente de eliminación (ok)"
          fi

      - name: Terraform Plan
        env:
          TF_VAR_anthropic_api_key:              ${{ secrets.TF_VAR_ANTHROPIC_API_KEY }}
          TF_VAR_weather_api_key:                ${{ secrets.TF_VAR_WEATHER_API_KEY }}
          TF_VAR_state_bucket_suffix:            ${{ secrets.STATE_BUCKET_SUFFIX }}
          TF_VAR_image_tag:                      ${{ github.sha }}
          TF_VAR_notification_email_subscribers: '["gmoscacofino@itba.edu.ar"]'
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        env:
          TF_VAR_anthropic_api_key:              ${{ secrets.TF_VAR_ANTHROPIC_API_KEY }}
          TF_VAR_state_bucket_suffix:            ${{ secrets.STATE_BUCKET_SUFFIX }}
          # TF_VAR_notification_email_subscribers NO se pasa aca: el plan
          # guardado ya tiene el valor, y reinyectarlo dispara el bug de
          # Terraform "Can't change variable when applying a saved plan" para
          # variables de tipo list (env var se reinterpreta de forma distinta
          # a como quedo guardada en el plan).
        run: terraform apply -auto-approve tfplan

      # Espera a que las tasks de Fargate pulleen la imagen y queden healthy antes
      # de seguir (si los endpoints/SG están mal, esto falla acá con un error claro).
      - name: Esperar ECS services estables
        if: github.event.inputs.action == 'apply'
        run: |
          CLUSTER=$(terraform output -raw ecs_cluster_name)
          aws ecs wait services-stable \
            --cluster "$CLUSTER" \
            --services jetsmart-prod-chat-handler jetsmart-prod-weather-poller \
            --region ${{ env.AWS_REGION }}

      - name: Inject Terraform outputs into config.js
        if: github.event.inputs.action == 'apply'
        run: |
          CONFIG="${{ github.workspace }}/frontend/js/config.js"
          sed -i "s|REEMPLAZAR_CON_terraform_output_cognito_user_pool_id|$(terraform output -raw cognito_user_pool_id)|g"     "$CONFIG"
          sed -i "s|REEMPLAZAR_CON_terraform_output_cognito_client_id|$(terraform output -raw cognito_client_id)|g"           "$CONFIG"
          sed -i "s|REEMPLAZAR_CON_terraform_output_cognito_hosted_ui_url|$(terraform output -raw cognito_hosted_ui_url)|g"   "$CONFIG"
          sed -i "s|REEMPLAZAR_CON_terraform_output_auth_callback_url|$(terraform output -raw auth_callback_url)|g"           "$CONFIG"
          sed -i "s|REEMPLAZAR_CON_terraform_output_frontend_url|$(terraform output -raw frontend_url)|g"                     "$CONFIG"
          sed -i "s|REEMPLAZAR_CON_terraform_output_chatbot_api_url|$(terraform output -raw chatbot_api_url)|g"               "$CONFIG"

      - name: Deploy Frontend to S3
        if: github.event.inputs.action == 'apply'
        run: |
          BUCKET=$(terraform output -raw frontend_bucket_name)
          aws s3 sync ${{ github.workspace }}/frontend/ s3://$BUCKET/ --delete

      - name: Seed vuelos en DynamoDB (business table)
        if: github.event.inputs.action == 'apply'
        run: |
          TABLE=$(terraform output -raw business_table_name)
          pip install boto3 -q
          python3 ${{ github.workspace }}/scripts/seed_flights.py "$TABLE"

      # Sin Glue Crawler: las tablas del lake usan partition projection (dt/hh),
      # así que Athena ve las particiones nuevas sin crawler.

      - name: Show Outputs
        if: github.event.inputs.action == 'apply'
        run: |
          {
            echo "## URLs del deploy"
            echo "| Recurso | URL |"
            echo "|---------|-----|"
            echo "| Frontend | $(terraform output -raw frontend_url) |"
            echo "| Chatbot API | $(terraform output -raw chatbot_api_url) |"
            echo "| Cognito Hosted UI | $(terraform output -raw cognito_hosted_ui_url) |"
            echo "| Auth Callback | $(terraform output -raw auth_callback_url) |"
            echo ""
            echo "## Capa de Analytics"
            echo "| Recurso | Nombre |"
            echo "|---------|--------|"
            echo "| Bucket del data lake | $(terraform output -raw analytics_bucket) |"
            echo "| Glue Database | $(terraform output -raw glue_database_name) |"
            echo "| Athena Workgroup | $(terraform output -raw athena_workgroup) |"
          } >> $GITHUB_STEP_SUMMARY

  # ── Job 4: Destroy (destruye toda la infraestructura) ─────────────────────
  destroy:
    name: Destroy
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
    needs: validate
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # Para destroy solo se necesitan los ZIPs — no hace falta compilar los layers reales
      - name: Create placeholder layer ZIPs
        run: |
          mkdir -p builds
          python3 -c "import zipfile; zipfile.ZipFile('builds/anthropic-layer.zip', 'w').close()"
          python3 -c "import zipfile; zipfile.ZipFile('builds/system-prompt-layer.zip', 'w').close()"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=jetsmart-terraform-state-${{ secrets.STATE_BUCKET_SUFFIX }}" \
            -backend-config="key=infra/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="use_lockfile=true" \
            -backend-config="encrypt=true"

      # Pre-vaciado de buckets para acelerar terraform destroy. force_destroy=true
      # está en todos los buckets — Terraform también maneja versiones y delete markers
      # del bucket boarding-passes (con versioning habilitado).
      - name: Vaciar buckets S3 antes de destruir
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          for BUCKET in \
            "jetsmart-prod-${ACCOUNT_ID}-frontend" \
            "jetsmart-prod-${ACCOUNT_ID}-boarding-passes" \
            "jetsmart-prod-${ACCOUNT_ID}-analytics" \
            "jetsmart-prod-${ACCOUNT_ID}-backups"; do
            echo "Vaciando s3://${BUCKET} ..."
            aws s3 rm "s3://${BUCKET}" --recursive --region "${{ env.AWS_REGION }}" 2>/dev/null || true
          done

      # Escala los ECS services a 0 antes de destruir — drena las tasks/ENIs para
      # que el teardown de la VPC (NAT, endpoints) no se trabe por ENIs en uso.
      - name: Escalar ECS services a 0
        run: |
          CLUSTER="jetsmart-prod-cluster"
          for SVC in jetsmart-prod-chat-handler jetsmart-prod-weather-poller; do
            aws ecs update-service --cluster "$CLUSTER" --service "$SVC" \
              --desired-count 0 --region ${{ env.AWS_REGION }} 2>/dev/null || true
          done

      - name: Terraform Destroy
        env:
          TF_VAR_anthropic_api_key:   ${{ secrets.TF_VAR_ANTHROPIC_API_KEY }}
          TF_VAR_weather_api_key:     ${{ secrets.TF_VAR_WEATHER_API_KEY }}
          TF_VAR_state_bucket_suffix: ${{ secrets.STATE_BUCKET_SUFFIX }}
        run: terraform destroy -auto-approve
